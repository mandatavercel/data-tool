# 투자 테마 태깅 규칙 — 카테고리(cat_l2)별 키워드 → boolean 태그
# SKU명(한글)에 키워드가 포함되면 해당 태그 True.
면류:
  spicy:      [불닭, 마라, 사천, 더레드, 열라면, 스파이시, 툼바]
  stir_fried: [볶음면, 범벅]
  black_bean: [짜파게티, 짜장]
  premium:    [블랙, 골드, 프리미엄]
맥주:
  imported:    [하이네켄, 아사히, 칭따오, 버드, 스텔라, 기네스, 코로나]
  non_alcohol: [논알콜, 무알콜, "0.0", 제로]
소주:
  fruit:    [과일, 자몽, 청포도, 복숭아, 딸기]
  low_abv:  ["16", "15", 순하]
