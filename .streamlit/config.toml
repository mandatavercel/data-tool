# Streamlit 서버 설정 (로컬 + Cloud 공용)

[server]
# 대용량 POS 데이터 업로드 (5GB)
maxUploadSize = 5120
maxMessageSize = 5120
headless = true
enableXsrfProtection = true
enableCORS = false

[browser]
gatherUsageStats = false

[theme]
# Mandata Dark — 보여주신 mandata_kr/web 화면과 동일 톤
# 배경: 거의 검정 / 강조: Mandata 오렌지 (로고 "data" 부분 색) / 텍스트: 거의 흰색
base = "dark"
primaryColor = "#F59E0B"           # Mandata orange — 강조 + 링크 + primary 버튼
backgroundColor = "#0A0A0B"        # 메인 배경 (거의 검정, 살짝 따뜻한 톤)
secondaryBackgroundColor = "#161618"  # 사이드바 / 카드 / 입력박스 배경
textColor = "#F1F5F9"              # 주 텍스트 (off-white)
font = "sans serif"
